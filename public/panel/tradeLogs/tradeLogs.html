<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Logs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="https://izumiihd.github.io/pixelitcdn/assets/img/favicon.ico" />
  <link rel="stylesheet" href="tradeLogs.css" />
</head>
<body style="background-color: #6d0180;">
  <div class="overlay-container" id="overlay">
    <div class="overlay-content">
      Verifying Connection...
      <div class="loader" style="display: inline-block"></div>
    </div>
  </div>
  <img alt="Blooks Background" class="bg_img" />
  <div class="navbar">
    <div>
      <div>
        <a href="../../dashboard"><i class="fa-solid fa-chart-column"></i></a>
        <a href="../enc/enc"><i class="fa-solid fa-wrench"></i></a>
        <a href="../ownerPanelPage/owner"><i class="fa-solid fa-code"></i></a>
        <a href="/" onclick="sessionStorage.clear(); location.reload();"><i class="fa-solid fa-right-from-bracket"></i></a>
      </div>
    </div>
    <div class="title_p" id="title_p">Pixelit</div>
  </div>

  <center>
    <h1 class="welcome-title"><i class="fa-solid fa-handshake"></i> Trade Logs</h1>
    <p>Showing completed trades from the past 24 hours.</p>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by username, item, or trade ID..." />
      <select id="filter-type">
        <option value="all">All</option>
        <option value="username">Username</option>
        <option value="item">Item</option>
        <option value="tradeId">Trade ID</option>
      </select>
      <button id="search-btn"><i class="fa-solid fa-magnifying-glass"></i></button>
      <button id="clear-btn"><i class="fa-solid fa-xmark"></i></button>
    </div>
    <div id="result-count"></div>
    <br />
    <div id="logsContainer"></div>
  </center>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="tradeLogs.js"></script>
  <script src="../../auth/verifyenc.js"></script>
  <script src="/auth/console.js"></script>
  <script src="/auth/banned.js"></script>
  <script src="/auth/auth.js"></script>
</body>
</html>
