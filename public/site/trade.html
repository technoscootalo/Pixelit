<!doctype html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="https://izumiihd.github.io/pixelitcdn/assets/img/favicon.ico" />
    <link rel="stylesheet" href="../css/trade.css" />
    <title>Trade</title>
  </head>
  <body style="background: #6d0180">
    <img alt="Blooks Background" class="bg_img" />

    <div class="trade-wrapper">
      <div class="trade-header">
        <div class="trade-title"><i class="fa-solid fa-right-left"></i> Trade</div>
        <button class="trade-close" onclick="window.location.href='/dashboard'" title="Leave Trade">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="trade-container">
        <div class="trade-side" id="your-side">
          <div class="trade-profile">
            <img id="your-pfp" src="https://izumiihd.github.io/pixelitcdn/assets/img/blooks/logo.png" alt="Your PFP" />
            <div id="your-username">You</div>
          </div>
          <div class="token-input-box">
            <span>Tokens:</span>
            <input type="number" id="your-tokens" min="0" value="0" />
          </div>
          <div class="offer-box" id="your-offer">
            <div class="offer-header">Your Offer</div>
            <div class="offer-grid" id="your-offer-grid"></div>
          </div>
        </div>

        <div class="trade-middle">
          <div class="pixel-picker-header">Your Pixels</div>
          <input type="text" id="pixel-search" placeholder="Search pixels..." />
          <div class="pixel-picker-grid" id="pixel-picker-grid"></div>
        </div>

        <div class="trade-side" id="their-side">
          <div class="trade-profile">
            <img id="their-pfp" src="https://izumiihd.github.io/pixelitcdn/assets/img/blooks/logo.png" alt="Their PFP" />
            <div id="their-username">Partner</div>
          </div>
          <div class="token-display">
            <span>Tokens:</span>
            <span id="their-tokens">0</span>
          </div>
          <div class="offer-box" id="their-offer">
            <div class="offer-header">Their Offer</div>
            <div class="offer-grid" id="their-offer-grid"></div>
          </div>
        </div>
      </div>

      <div class="trade-bottom">
        <div class="trade-chat">
          <div class="chat-messages" id="trade-chat-messages"></div>
          <div class="chat-input-box">
            <input type="text" id="trade-chat-input" placeholder="Message..." />
            <button id="trade-chat-send"><i class="fa-solid fa-paper-plane"></i></button>
          </div>
        </div>
        <div class="trade-actions">
          <div class="ready-status" id="ready-status"></div>
          <button class="trade-action-btn accept-btn" id="accept-trade">
            <i class="fa-solid fa-check"></i> Accept
          </button>
          <button class="trade-action-btn decline-btn" id="decline-trade">
            <i class="fa-solid fa-xmark"></i> Decline
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/javascript/trade.js"></script>
    <script src="/auth/auth.js"></script>
  </body>
</html>
